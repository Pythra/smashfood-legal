name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: cp dist/index.html dist/404.html

      - name: Copy build to docs folder
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll

      - name: Commit docs for GitHub Pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Deploy site to docs folder
          file_pattern: docs/**
          branch: main
